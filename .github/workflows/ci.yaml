name: CI
run-name: Test, Build pipeline
on:
  push:
    branches: 
      - "master"
    paths: [
      ".github/**",
      "backend/**",
      "!**.md",
      "!**/docs/**",
    ]
  pull_request:
    paths: [
      ".github/**",
      "backend/**",
      "!**.md",
      "!**/docs/**",
    ]
    

env:
  NODE_VERSION: 20

jobs:
  lint:
    name: "Linter"
    runs-on: ubuntu-latest
    steps:
    - name: "Code checkout"
      uses: actions/checkout@v6
    - name: "Setup node"
      uses: "./.github/actions/setup-node-action"
      with:
        node-version: ${{ env.NODE_VERSION }}
        working-directory: "./backend"
    - name: "Linter"
      working-directory: ./backend
      run: "npm run lint"

  unit-test:
    name: "Unit tests Node.js version: ${{ matrix.node_version }}"
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node_version: [18, 20, 22]
      fail-fast: false
    steps:
      - name: "Code checkout"
        uses: actions/checkout@v6
      
      - name: "Setup node"
        uses: "./.github/actions/setup-node-action"
        with:
          node-version: ${{ matrix.node_version }}
          working-directory: "./backend"
      
      - name: "Tests"
        working-directory: ./backend
        run: "npm run unit-tests"

      - name: "Generate summary"
        run: "echo summary end >> $GITHUB_STEP_SUMMARY"
  
  integration-test:
    name: "Integration tests"
    needs: [unit-test]
    runs-on: ubuntu-latest
    env:
      REDIS_ADDRESS: "redis://127.0.0.1:6379"
      DB_HOST: "127.0.0.1"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "products"
      PORT: "3000"
      INSTANCE_ID: "1"
    services:
      postgres:
        image: "postgres:16-alpine"
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: "postgres"
          POSTGRES_PASSWORD: "postgres"
          POSTGRES_DB: "products"
        options: >-
          --health-cmd "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5
          --health-start-period 10s
      redis:
        image: "redis:8"
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli --raw incr ping"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5
          --health-start-period 1s 
    steps:
      - name: "Code checkout"
        uses: actions/checkout@v6
      
      - name: "Setup node"
        uses: "./.github/actions/setup-node-action"
        with:
          node-version: ${{ env.NODE_VERSION }}
          working-directory: "./backend"

      - name: "Seed db"
        run: > 
          psql -h 127.0.0.1 -U ${DB_USER} -d ${DB_NAME} 
          -f ./db/seed.sql
        env:
          PGPASSWORD: "postgres"
      
      - name: "Populate database with initial data"
        working-directory: ./backend
        run: npm run integration-tests"

    
  build-and-push:
    needs: [integration-test]
    name: "Build and push to GHCR"
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: "Code checkout"
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        timeout-minutes: 6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/mroczek123/backend:latest
          context: ./backend

