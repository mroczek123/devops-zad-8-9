name: CI
run-name: Test, Build pipeline
on:
  push:
    branches: 
      - "master"
    paths-ignore: ["**.md", "docs/**"]
  pull_request:
    paths-ignore: ["**.md", "docs/**"]

# Cache: Cache npm zależności (przez cache: 'npm' w actions/setup-node@v4)
# Timeout: timeout-minutes na co najmniej jednym jobie
# Step names: Każdy step musi mieć opisowy name:

env:
  NODE_VERSION: 18

jobs:
  lint:
    name: "Linter"
    runs-on: ubuntu-latest
    steps:
    - name: "Code checkout"
      uses: actions/checkout@v6

    - name: "Linter"
      working-directory: ./backend
      run: "npm install --include=dev && npm run lint"

  unit-test:
    name: "Unit tests Node.js version: ${{ matrix.node_version }}"
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node_version: [18, 20, 22] 
    steps:
      - name: "Code checkout"
        uses: actions/checkout@v6
      
      - name: "Tests"
        working-directory: ./backend
        run: "npm install --include=dev && npm run unit-test"

      # - name: "Report"
      #   if: ${{ matrix.node_version == 20 }}
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: "raport"
      #     path: "TODO"
      #    retention-days: 1
      - name: "Generate summary"
        run: "echo hi >> $GITHUB_STEP_SUMMARY"
  
  integration-test:
    name: "Integration tests"
    needs: [unit-test]
    runs-on: ubuntu-latest
    env:
      REDIS_ADDRESS: "redis://127.0.0.1:6379"
      DB_HOST: "127.0.0.1"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "products"
      PORT: "3000"
      INSTANCE_ID: "1"
    services:
      postgres:
        image: "postgres:16-alpine"
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: "postgres"
          POSTGRES_PASSWORD: "postgres"
          POSTGRES_DB: "products"
        options: >-
          --health-cmd "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5
          --health-start-period 10s
      redis:
        image: "redis:8"
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli --raw incr ping"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5
          --health-start-period 1s 
    steps:
      - name: "Code checkout"
        uses: actions/checkout@v6
      - name: "Seed db"
        run: > 
          psql -h 127.0.0.1 -U ${DB_USER} -d ${DB_NAME} 
          -f ./db/seed.sql
        env:
          PGPASSWORD: "postgres"
      - name: "Populate database with initial data"
        working-directory: ./backend
        run: "npm install --include=dev && npm run integration-tests"

      # - name: "Generate report"
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: "raport"
      #     path: "TODO"
      #     retention-days: 1

      - name: "Generate summary"
        run: "echo lolz >> $GITHUB_STEP_SUMMARY"
    
  build:
    needs: [integration-test]
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - name: "Code checkout"
        uses: actions/checkout@v6
