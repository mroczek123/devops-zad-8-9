<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Statystyki</title>
</head>

<body>
    Stats
    <div>
        Liczba produktów: <span id="productsAmount"></span>
    </div>
    <div>
        Id instancji <span id="instanceId"></span>
    </div>
    <div>
        Trafienia cache redis dla products <span id="productsCacheHits"></span>
    </div>
    <script>
        fetch("/api/stats").then(async result => {
            const response = await result.json();
            document.getElementById("productsAmount").innerHTML = response["productsAmount"];
            document.getElementById("instanceId").innerHTML = response["instanceId"];
            document.getElementById("productsCacheHits").innerHTML = response["productsCacheHits"];
        })
    </script>

</body>

</html>
